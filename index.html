<style>
:root{
  --bg:#0E1220; --bg-soft:#161B2E; --card:#1B2138; --line:#2A3152;
  --text:#EDEFF7; --muted:#8B92B0; --amber:#F5B841; --amber-ink:#1A1405;
  --danger:#FF5C6C; --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
h1,h2,h3{font-family:'Sora',sans-serif}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px}
.hidden{display:none!important}
.screen{min-height:100dvh;display:flex;flex-direction:column}

/* ---------- login ---------- */
#tela-login,#tela-config{justify-content:center;padding:28px;gap:8px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.logo-mark{width:52px;height:52px;border-radius:14px;background:var(--amber);display:grid;place-items:center;font-size:26px;color:var(--amber-ink)}
.logo h1{font-size:28px;letter-spacing:-.5px}
.logo span{color:var(--muted);font-size:13px;font-weight:400;display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--line);
  background:var(--bg-soft);color:var(--text);outline:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--amber)}
.btn{width:100%;padding:15px;border-radius:14px;font-weight:700;font-size:16px;
  background:var(--amber);color:var(--amber-ink);margin-top:6px}
.btn:active{transform:scale(.98)}
.btn-ghost{background:none;color:var(--muted);font-weight:500;font-size:14px;margin-top:14px}
.btn-ghost b{color:var(--amber)}
.btn-secundario{width:100%;padding:14px;border-radius:14px;font-weight:600;font-size:15px;
  background:var(--bg);border:1px solid var(--line);color:var(--text);margin-top:10px}
.aviso{margin-top:14px;padding:12px 14px;border-radius:12px;background:var(--bg-soft);
  border:1px solid var(--line);color:var(--muted);font-size:13px;line-height:1.5}
.aviso.erro{border-color:var(--danger);color:var(--danger)}
.aviso.ok{border-color:var(--amber);color:var(--amber)}

/* ---------- app ---------- */
header{padding:18px 20px 12px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:linear-gradient(var(--bg) 75%,transparent);z-index:5}
header h2{font-size:22px;letter-spacing:-.4px}
header .sair{color:var(--muted);font-size:13px;padding:8px 10px}
.abas{display:flex;gap:8px;padding:4px 20px 10px}
.aba{flex:1;padding:11px;border-radius:999px;font-weight:600;font-size:14px;
  background:var(--bg-soft);color:var(--muted);border:1px solid var(--line)}
.aba.ativa{background:var(--amber);color:var(--amber-ink);border-color:var(--amber)}

.filtros{display:flex;gap:8px;padding:2px 20px 12px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filtros::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;
  font-weight:600;font-size:12px;background:var(--bg-soft);border:1px solid var(--line);color:var(--muted)}
.chip.ativo{border-color:var(--amber);color:var(--text);background:var(--card)}

main{flex:1;padding:4px 16px 110px;display:flex;flex-direction:column;gap:6px}
.vazio{margin:14px 0;text-align:center;color:var(--muted);font-size:13px;line-height:1.7;padding:0 20px}
.vazio .icone{font-size:32px;display:block;margin-bottom:8px}

/* logos dos streamings */
.logo-str{width:18px;height:18px;border-radius:5px;object-fit:cover;flex-shrink:0}
.logo-str.g{width:38px;height:38px;border-radius:11px}
.logo-str.m{width:22px;height:22px;border-radius:6px}
.mini-icone{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  font-family:'Sora';font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.mini-icone.p{width:18px;height:18px;font-size:8px;border-radius:5px}

/* ---------- seções e carrosséis ---------- */
.secao{margin-top:14px}
.secao h3{font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.secao h3 .sub{font-size:12px;color:var(--muted);font-weight:500}
.carrossel{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.carrossel::-webkit-scrollbar{display:none}
.poster{flex-shrink:0;width:104px;text-align:left;position:relative}
.poster img{width:104px;height:156px;object-fit:cover;border-radius:12px;background:var(--card);border:1px solid var(--line)}
.poster .nome-p{font-size:11px;font-weight:600;line-height:1.3;margin-top:6px;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.poster .rank{position:absolute;top:-6px;left:-4px;font-family:'Sora';font-weight:800;font-size:30px;
  color:var(--amber);text-shadow:0 2px 8px rgba(0,0,0,.8);z-index:1}
.fonte{font-size:10px;color:var(--muted);margin-top:8px}
.carregando{color:var(--muted);font-size:13px;padding:20px 0;text-align:center;width:100%}

/* ---------- card ---------- */
.carrossel-cards{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.carrossel-cards::-webkit-scrollbar{display:none}
.carrossel-cards .card{flex-shrink:0;width:300px}
.lista-vertical{display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;display:flex;flex-direction:column;gap:12px}
.card-topo{display:flex;gap:12px;align-items:flex-start}
.card img.capa{width:56px;height:84px;object-fit:cover;border-radius:10px;flex-shrink:0;background:var(--bg)}
.card-nome{font-family:'Sora';font-weight:700;font-size:16px;line-height:1.3;word-break:break-word;flex:1}
.badge{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  letter-spacing:.3px;padding:4px 9px;border-radius:999px;color:#fff;white-space:nowrap}
.contador{display:flex;gap:10px}
.bloco{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:14px;
  display:flex;align-items:center;justify-content:space-between;padding:6px 8px}
.bloco .rotulo{font-size:10px;color:var(--muted);letter-spacing:1.2px;font-weight:600;padding-left:6px}
.bloco .valor{font-family:'Sora';font-weight:800;font-size:22px;color:var(--amber);min-width:34px;text-align:center}
.bloco .max{font-size:10px;color:var(--muted);font-weight:600}
.bloco button{width:34px;height:34px;border-radius:10px;background:var(--bg-soft);
  color:var(--text);font-size:18px;font-weight:700;border:1px solid var(--line)}
.bloco button:active{background:var(--amber);color:var(--amber-ink)}
.card-acoes{display:flex;gap:8px}
.acao{flex:1;padding:11px;border-radius:12px;font-weight:600;font-size:13px;
  background:var(--bg-soft);border:1px solid var(--line);color:var(--text)}
.acao.principal{background:var(--amber);color:var(--amber-ink);border-color:var(--amber);font-weight:700}
.acao:active{transform:scale(.97)}

/* ---------- botão flutuante / modal ---------- */
#btn-add{position:fixed;right:20px;bottom:calc(24px + env(safe-area-inset-bottom));
  width:60px;height:60px;border-radius:20px;background:var(--amber);color:var(--amber-ink);
  font-size:30px;font-weight:700;box-shadow:0 8px 24px rgba(245,184,65,.35);z-index:6}
#btn-add:active{transform:scale(.94)}
#modal{position:fixed;inset:0;background:rgba(8,10,20,.7);backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;z-index:10}
.folha{width:100%;background:var(--bg-soft);border-radius:24px 24px 0 0;
  padding:22px 20px calc(26px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto}
.folha h3{font-size:19px;margin-bottom:16px}
.linha-dupla{display:flex;gap:10px}
.linha-dupla .field{flex:1}
.folha .btn-ghost{width:100%;text-align:center}
.busca-resultados{display:flex;flex-direction:column;gap:8px;margin:0 0 8px}
.resultado{display:flex;gap:10px;align-items:center;padding:8px;border-radius:12px;
  background:var(--bg);border:1px solid var(--line);text-align:left;color:var(--text);width:100%}
.resultado:active{border-color:var(--amber)}
.resultado img.capa-r,.resultado .sem-capa{width:42px;height:62px;object-fit:cover;border-radius:8px;background:var(--bg-soft);flex-shrink:0}
.resultado .info{font-size:13px;font-weight:600;line-height:1.35;flex:1}
.resultado .info span{display:block;color:var(--muted);font-weight:400;font-size:12px}
.mini-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;align-items:center}
.buscando{color:var(--muted);font-size:13px;text-align:center;padding:10px}
.grade-streamings{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:8px}
.tile{display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;
  background:var(--bg);border:1px solid var(--line);font-weight:600;font-size:14px;color:var(--text);text-align:left}
.tile:active{transform:scale(.97);border-color:var(--amber)}
.seletor-streaming{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:14px;background:var(--bg);border:1px solid var(--line);color:var(--text);font-weight:600;font-size:15px}
.seletor-streaming .trocar{margin-left:auto;color:var(--amber);font-size:13px;font-weight:600}
.disponivel{font-size:12px;color:var(--muted);margin:-6px 0 14px;line-height:1.8;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.capa-preview{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.capa-preview img{width:54px;height:80px;object-fit:cover;border-radius:10px}
.capa-preview .titulo-escolhido{font-family:'Sora';font-weight:700;font-size:15px;line-height:1.3}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, query, orderBy, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ---------- streamings ---------- */
const STREAMINGS = {
  netflix:   { nome:"Netflix",     cor:"#E50914", sigla:"N",   apelidos:["netflix"],      busca:t=>"https://www.netflix.com/search?q="+t },
  prime:     { nome:"Prime Video", cor:"#00A8E1", sigla:"PV",  apelidos:["amazon prime"], busca:t=>"https://www.primevideo.com/search?phrase="+t },
  hbomax:    { nome:"HBO Max",     cor:"#7B2BF9", sigla:"MAX", apelidos:["hbo max","max"],busca:t=>"https://play.hbomax.com/search?q="+t },
  paramount: { nome:"Paramount+",  cor:"#0064FF", sigla:"P+",  apelidos:["paramount"],    busca:()=>"https://www.paramountplus.com/search/" },
  globoplay: { nome:"Globoplay",   cor:"#FB0D54", sigla:"GP",  apelidos:["globo"],        busca:t=>"https://globoplay.globo.com/busca/?q="+t },
  disney:    { nome:"Disney+",     cor:"#113CCF", sigla:"D+",  apelidos:["disney"],       busca:t=>"https://www.disneyplus.com/search?q="+t },
  appletv:   { nome:"Apple TV",    cor:"#555A66", sigla:"TV",  apelidos:["apple tv"],     busca:t=>"https://tv.apple.com/search?term="+t },
};
const TMDB=window.TMDB_KEY, IMG="https://image.tmdb.org/t/p/", API="https://api.themoviedb.org/3";

/* ---------- estado ---------- */
let auth=null, bd=null, usuario=null, titulos=[], abaAtual="assistindo", filtroStreaming=null,
    editandoId=null, modoCadastro=false, gradeOrigem="busca",
    streamingEscolhido="netflix", capaEscolhida=null, tmdbId=null, tipoEscolhido="tv",
    estruturaEscolhida=null, resultadosBusca=[], timerBusca=null,
    LOGOS={}, PROV_IDS={}, DESC={}, descIndex=new Map(), logosProntos=null;

const $=s=>document.querySelector(s);
const esc=s=>(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const colTitulos=()=>collection(bd,"usuarios",usuario.uid,"titulos");
const tmdbGet=async caminho=>{ const r=await fetch(`${API}${caminho}${caminho.includes("?")?"&":"?"}api_key=${TMDB}`); return r.json(); };

/* ---------- ícones ---------- */
function iconeStreaming(k,tam){
  const s=STREAMINGS[k];
  if(LOGOS[k]) return `<img class="logo-str ${tam||""}" src="${LOGOS[k]}" alt="${s.nome}">`;
  return `<span class="mini-icone ${tam?"":"p"}" style="background:${s.cor}">${s.sigla}</span>`;
}
async function carregarLogos(){
  try{
    const [tv,mv]=await Promise.all([
      tmdbGet(`/watch/providers/tv?language=pt-BR&watch_region=BR`),
      tmdbGet(`/watch/providers/movie?language=pt-BR&watch_region=BR`),
    ]);
    const todos=[...(tv.results||[]),...(mv.results||[])];
    for(const [k,s] of Object.entries(STREAMINGS)){
      const p=todos.find(x=>s.apelidos.some(a=>(x.provider_name||"").toLowerCase().includes(a)));
      if(p){ LOGOS[k]=IMG+"w92"+p.logo_path; PROV_IDS[k]=p.provider_id; }
    }
  }catch(e){}
  montarGrade(); montarFiltros();
}

/* ---------- inicialização ---------- */
window.addEventListener("DOMContentLoaded", ()=>{
  montarGrade(); montarFiltros();
  logosProntos=carregarLogos();
  if(window.FIREBASE_CONFIG.apiKey==="COLE_AQUI"){
    $("#tela-config").classList.remove("hidden"); return;
  }
  const app=initializeApp(window.FIREBASE_CONFIG);
  auth=getAuth(app); bd=getFirestore(app);
  onAuthStateChanged(auth,u=>{
    if(u){ usuario=u; abrirApp(); }
    else if(usuario){ location.reload(); }
    else{ $("#tela-login").classList.remove("hidden"); }
  });
});

/* ---------- login ---------- */
$("#alternar-modo").onclick=()=>{
  modoCadastro=!modoCadastro;
  $("#btn-entrar").textContent=modoCadastro?"Criar conta":"Entrar";
  $("#alternar-modo").innerHTML=modoCadastro?"Já tem conta? <b>Entrar</b>":"Não tem conta? <b>Criar conta</b>";
  mostrarMsg("");
};
$("#btn-entrar").onclick=async ()=>{
  const email=$("#email").value.trim(), senha=$("#senha").value;
  if(!email||!senha){ mostrarMsg("Preencha e-mail e senha.","erro"); return; }
  $("#btn-entrar").textContent="Aguarde...";
  try{
    if(modoCadastro) await createUserWithEmailAndPassword(auth,email,senha);
    else await signInWithEmailAndPassword(auth,email,senha);
  }catch(e){
    const mapa={"auth/invalid-credential":"E-mail ou senha incorretos.","auth/user-not-found":"E-mail não cadastrado.","auth/wrong-password":"Senha incorreta.","auth/email-already-in-use":"Este e-mail já tem conta. Toque em Entrar.","auth/weak-password":"A senha precisa de ao menos 6 caracteres.","auth/invalid-email":"E-mail inválido.","auth/admin-restricted-operation":"O cadastro está bloqueado nas configurações do Firebase."};
    mostrarMsg(mapa[e.code]||"Erro: "+e.code,"erro");
  }
  $("#btn-entrar").textContent=modoCadastro?"Criar conta":"Entrar";
};
function mostrarMsg(txt,tipo){
  const el=$("#msg-login");
  if(!txt){ el.classList.add("hidden"); return; }
  el.textContent=txt; el.className="aviso "+(tipo||"");
}
$("#btn-sair").onclick=()=>signOut(auth);

/* ---------- app ---------- */
async function abrirApp(){
  $("#tela-login").classList.add("hidden");
  $("#tela-app").classList.remove("hidden");
  await carregar();
  carregarDescobertas();
}
async function carregar(){
  try{
    const snap=await getDocs(query(colTitulos(),orderBy("criado_em","desc")));

}

/* ---------- descobrir: top 10 e lançamentos por streaming ---------- */
async function carregarDescobertas(){
  const chave=filtroStreaming||"todos";
  if(DESC[chave]){ desenhar(); return; }
  DESC[chave]={carregando:true};
  desenhar();
  await logosProntos;
  const hoje=new Date().toISOString().slice(0,10);
  let filmes=[],series=[],lanc=[];
  try{
    if(chave==="todos"){
      const ids=Object.values(PROV_IDS).join("|");
      const [f,s,lf,ls]=await Promise.all([
        tmdbGet(`/trending/movie/week?language=pt-BR`),
        tmdbGet(`/trending/tv/week?language=pt-BR`),
        tmdbGet(`/discover/movie?language=pt-BR&watch_region=BR&with_watch_providers=${ids}&with_watch_monetization_types=flatrate|ads&sort_by=primary_release_date.desc&primary_release_date.lte=${hoje}&vote_count.gte=20`),
        tmdbGet(`/discover/tv?language=pt-BR&watch_region=BR&with_watch_providers=${ids}&with_watch_monetization_types=flatrate|ads&sort_by=first_air_date.desc&first_air_date.lte=${hoje}&vote_count.gte=20`),
      ]);
      filmes=(f.results||[]).slice(0,10).map(x=>({...x,media_type:"movie"}));
      series=(s.results||[]).slice(0,10).map(x=>({...x,media_type:"tv"}));
      lanc=[...(lf.results||[]).slice(0,6).map(x=>({...x,media_type:"movie"})),
            ...(ls.results||[]).slice(0,6).map(x=>({...x,media_type:"tv"}))]
        .sort((a,b)=>(b.release_date||b.first_air_date||"").localeCompare(a.release_date||a.first_air_date||""))
        .slice(0,10);
    }else{
      const id=PROV_IDS[chave];
      if(id){
        const base=`language=pt-BR&watch_region=BR&with_watch_providers=${id}&with_watch_monetization_types=flatrate|ads`;
        const [f,s,lf,ls]=await Promise.all([
          tmdbGet(`/discover/movie?${base}&sort_by=popularity.desc`),
          tmdbGet(`/discover/tv?${base}&sort_by=popularity.desc`),
          tmdbGet(`/discover/movie?${base}&sort_by=primary_release_date.desc&primary_release_date.lte=${hoje}&vote_count.gte=10`),
          tmdbGet(`/discover/tv?${base}&sort_by=first_air_date.desc&first_air_date.lte=${hoje}&vote_count.gte=10`),
        ]);
        filmes=(f.results||[]).slice(0,10).map(x=>({...x,media_type:"movie"}));
        series=(s.results||[]).slice(0,10).map(x=>({...x,media_type:"tv"}));
        lanc=[...(lf.results||[]).slice(0,6).map(x=>({...x,media_type:"movie"})),
              ...(ls.results||[]).slice(0,6).map(x=>({...x,media_type:"tv"}))]
          .sort((a,b)=>(b.release_date||b.first_air_date||"").localeCompare(a.release_date||a.first_air_date||""))
          .slice(0,10);
      }
    }
  }catch(e){}
  DESC[chave]={filmes,series,lanc};
  [...filmes,...series,...lanc].forEach(x=>descIndex.set(x.media_type+"-"+x.id,x));
  desenhar();
}

function htmlDescobrir(){
  const chave=filtroStreaming||"todos";

  if(!d||d.carregando) return `<div class="carregando">Carregando sugestões...</div>`;
  let h="";

    <div class="carrossel">${d.filmes.map((x,i)=>htmlPoster(x,i+1)).join("")}</div></div>`;
  if(d.series.length) h+=`<div class="secao"><h3>📺 Top 10 Séries da semana <span class="sub">· ${sub}</span></h3>
    <div class="carrossel">${d.series.map((x,i)=>htmlPoster(x,i+1)).join("")}</div></div>`;
  if(d.lanc.length) h+=`<div class="secao"><h3>🆕 Lançamentos <span class="sub">· ${sub}</span></h3>
    <div class="carrossel">${d.lanc.map(x=>htmlPoster(x)).join("")}</div></div>`;
  if(h) h+=`<div class="fonte">Sugestões: TMDB · disponibilidade por JustWatch</div>`;
  return h;
}

/* ---------- lista ---------- */
function estruturaDe(t){
  try{
    const a=JSON.parse(t.estrutura);
    const limpa=Array.isArray(a)?a.filter(n=>Number.isFinite(n)&&n>0):[];
    return limpa.length?limpa:null;
  }catch{ return null; }
}
function valorContador(v,max){ return `${v}${max?`<span class="max">/${max}</span>`:""}`; }

function htmlCard(t){
  const s=STREAMINGS[t.streaming]||{nome:t.streaming,cor:"#666",busca:x=>"https://www.google.com/search?q="+x};
  const est=estruturaDe(t);
  const maxT=est?est.length:null;
  const maxE=est?est[Math.min(t.temporada??1,maxT)-1]:null;
  const contador=(t.tipo!=="movie")?`
    <div class="contador">
      <div class="bloco"><span class="rotulo">TEMP</span>
        <span class="valor" data-tval="${t.id}">${valorContador(t.temporada??1,maxT)}</span>
        <div style="display:flex;gap:4px">
          <button data-aj="${t.id}|temporada|-1">−</button>
          <button data-aj="${t.id}|temporada|1">+</button>
        </div>
      </div>
      <div class="bloco"><span class="rotulo">EP</span>
        <span class="valor" data-eval="${t.id}">${valorContador(t.episodio??1,maxE)}</span>
        <div style="display:flex;gap:4px">
          <button data-aj="${t.id}|episodio|-1">−</button>
          <button data-aj="${t.id}|episodio|1">+</button>
        </div>
      </div>
    </div>`:"";
  const mover=t.status==="assistindo"
    ?`<button class="acao" data-mover="${t.id}|proximo">☆ Para depois</button>`
    :`<button class="acao" data-mover="${t.id}|assistindo">▶ Comecei a ver</button>`;
  return `
  <div class="card">
    <div class="card-topo">
      ${t.capa?`<img class="capa" src="${esc(t.capa)}" alt="" loading="lazy">`:""}
      <div class="card-nome">${esc(t.nome)}</div>
      <span class="badge" style="background:${s.cor}">${iconeStreaming(t.streaming)}${s.nome}</span>
    </div>
    ${contador}
    <div class="card-acoes">
      <button class="acao principal" data-abrir="${t.id}">▶ Abrir no ${s.nome}</button>
      ${mover}
    </div>
    <div class="card-acoes">
      <button class="acao" data-editar="${t.id}">Editar</button>
      <button class="acao" style="color:var(--danger)" data-excluir="${t.id}">Excluir</button>
    </div>
  </div>`;
}

function desenhar(){
  const lista=$("#lista");
  let itens=titulos.filter(t=>t.status===abaAtual);
  if(filtroStreaming) itens=itens.filter(t=>t.streaming===filtroStreaming);
  const nomeF=filtroStreaming?STREAMINGS[filtroStreaming].nome:null;

  if(abaAtual==="proximo"){
    lista.innerHTML=itens.length
      ?`<div class="lista-vertical">${itens.map(htmlCard).join("")}</div>`
      :`<div class="vazio" style="margin-top:50px"><span class="icone">☆</span>Sua fila${nomeF?` na ${nomeF}`:""} está vazia.<br>Toque em <b>+</b> para adicionar.</div>`;
    return;
  }

  // aba Assistindo (Início): descobertas em cima, assistindo embaixo
  let h=htmlDescobrir();
  h+=`<div class="secao"><h3>▶ Assistindo${nomeF?` <span class="sub">· ${nomeF}</span>`:""}</h3>`;
  if(!itens.length){
    h+=`<div class="vazio"><span class="icone">🎬</span>Nada por aqui${nomeF?` na ${nomeF}`:""} ainda.<br>Toque em <b>+</b> para adicionar.</div>`;
  }else if(itens.length===1){
    h+=`<div class="lista-vertical">${htmlCard(itens[0])}</div>`;
  }else{
    h+=`<div class="carrossel-cards">${itens.map(htmlCard).join("")}</div>`;
  }
  h+=`</div>`;
  lista.innerHTML=h;
}

$("#lista").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  if(b.dataset.aj){ const [id,c,d]=b.dataset.aj.split("|"); ajustar(id,c,parseInt(d)); }
  else if(b.dataset.mover){ const [id,st]=b.dataset.mover.split("|"); mover(id,st); }

  else if(b.dataset.excluir) excluir(b.dataset.excluir);
  else if(b.dataset.descId) abrirDescoberta(parseInt(b.dataset.descId),b.dataset.descTipo);
});

/* ---------- ações ---------- */
function abrirStreaming(id){
  const t=titulos.find(x=>x.id===id); if(!t) return;
  const s=STREAMINGS[t.streaming];
  window.open(s.busca(encodeURIComponent(t.nome)),"_blank");
}
async function ajustar(id,campo,delta){
  const t=titulos.find(x=>x.id===id); if(!t) return;
  const est=estruturaDe(t);
  let temporada=t.temporada??1, episodio=t.episodio??1;
  const maxT=est?est.length:Infinity;
  if(campo==="episodio"){
    episodio+=delta;
    const maxE=est?est[temporada-1]:Infinity;
    if(episodio>maxE){ if(temporada<maxT){ temporada++; episodio=1; } else episodio=maxE; }
    if(episodio<1){ if(temporada>1){ temporada--; episodio=est?est[temporada-1]:1; } else episodio=1; }
  }else{
    temporada=Math.min(Math.max(1,temporada+delta),maxT===Infinity?9999:maxT);
    const maxE=est?est[temporada-1]:Infinity;
    if(episodio>maxE) episodio=1;
  }
  t.temporada=temporada; t.episodio=episodio;
  // atualiza só os números no card, sem redesenhar a tela (não perde a rolagem)
  const elT=document.querySelector(`[data-tval="${id}"]`);
  const elE=document.querySelector(`[data-eval="${id}"]`);
  const novoMaxT=est?est.length:null;
  const novoMaxE=est?est[temporada-1]:null;
  if(elT&&elE){
    elT.innerHTML=valorContador(temporada,novoMaxT);
    elE.innerHTML=valorContador(episodio,novoMaxE);
  }else desenhar();
  try{ await updateDoc(doc(bd,"usuarios",usuario.uid,"titulos",id),{temporada,episodio}); }catch(e){}
}
async function mover(id,status){
  const t=titulos.find(x=>x.id===id); if(!t) return;
  t.status=status; desenhar();
  try{ await updateDoc(doc(bd,"usuarios",usuario.uid,"titulos",id),{status}); }catch(e){}
}
async function excluir(id){
  const t=titulos.find(x=>x.id===id);
  if(!confirm(`Excluir "${t.nome}"?`)) return;
  titulos=titulos.filter(x=>x.id!==id); desenhar();
  try{ await deleteDoc(doc(bd,"usuarios",usuario.uid,"titulos",id)); }catch(e){}
}
function editar(id){
  const t=titulos.find(x=>x.id===id); if(!t) return;
  editandoId=id; gradeOrigem="form";
  streamingEscolhido=t.streaming; capaEscolhida=t.capa||null;
  tmdbId=t.tmdb_id||null; tipoEscolhido=t.tipo||"tv";
  estruturaEscolhida=estruturaDe(t);
  atualizarSeletor(); atualizarPreviewCapa(t.nome);
  $("#modal-titulo").textContent="Editar título";
  $("#f-nome").value=t.nome; $("#f-status").value=t.status;
  $("#f-temporada").value=t.temporada??1; $("#f-episodio").value=t.episodio??1;
  $("#grupo-te").classList.toggle("hidden",tipoEscolhido==="movie");
  $("#disponivel").classList.add("hidden");
  mostrarPasso("form");
  $("#modal").classList.remove("hidden");
}

/* ---------- busca livre ---------- */
$("#f-busca").addEventListener("input",()=>{
  clearTimeout(timerBusca);
  const q=$("#f-busca").value.trim();
  if(q.length<2){ $("#busca-resultados").innerHTML=""; return; }
  $("#busca-resultados").innerHTML=`<div class="buscando">Buscando...</div>`;
  timerBusca=setTimeout(()=>buscarTMDB(q),450);
});
async function buscarTMDB(q){
  try{
    const j=await tmdbGet(`/search/multi?language=pt-BR&region=BR&query=${encodeURIComponent(q)}`);
    resultadosBusca=(j.results||[]).filter(x=>x.media_type==="movie"||x.media_type==="tv").slice(0,6);
  }catch(e){
    $("#busca-resultados").innerHTML=`<div class="aviso erro">Falha na busca. Verifique sua internet.</div>`; return;
  }
  if($("#f-busca").value.trim()!==q) return;
  if(!resultadosBusca.length){
    $("#busca-resultados").innerHTML=`<div class="aviso">Nada encontrado. Tente outro nome ou adicione manualmente.</div>`; return;
  }
  $("#busca-resultados").innerHTML=resultadosBusca.map((x,i)=>{
    const nome=x.title||x.name;
    const ano=(x.release_date||x.first_air_date||"").slice(0,4);
    const capa=x.poster_path?IMG+"w185"+x.poster_path:"";
    const tipo=x.media_type==="movie"?"Filme":"Série";
    return `<button class="resultado" data-res="${i}">
      ${capa?`<img class="capa-r" src="${capa}" alt="">`:`<div class="sem-capa"></div>`}
      <div class="info">${esc(nome)}<span>${tipo}${ano?" · "+ano:""}</span>
        <div class="mini-badges" id="prov-${i}"><span style="color:var(--muted);font-size:10px">verificando streamings...</span></div>
      </div>
    </button>`;
  }).join("");
  document.querySelectorAll("[data-res]").forEach(b=>b.onclick=()=>escolherResultado(parseInt(b.dataset.res)));
  resultadosBusca.forEach((x,i)=>carregarProvedores(x,i));
}
function mapearProvedores(lista){
  const achados=[];
  (lista||[]).forEach(p=>{
    const nome=(p.provider_name||"").toLowerCase();
    for(const [k,s] of Object.entries(STREAMINGS)){
      if(s.apelidos.some(a=>nome.includes(a)) && !achados.includes(k)) achados.push(k);
    }
  });
  return achados;
}
async function carregarProvedores(x,i){
  try{
    const j=await tmdbGet(`/${x.media_type}/${x.id}/watch/providers`);
    const br=j.results?.BR;
    x._provedores=mapearProvedores([...(br?.flatrate||[]),...(br?.ads||[])]);
  }catch(e){ x._provedores=[]; }
  if(i===null) return;
  const el=$("#prov-"+i); if(!el) return;
  el.innerHTML=x._provedores.length
    ?x._provedores.map(k=>iconeStreaming(k)).join("")+`<span style="color:var(--muted);font-size:10px">${x._provedores.map(k=>STREAMINGS[k].nome).join(", ")}</span>`
    :`<span style="color:var(--muted);font-size:10px">fora dos seus streamings (ou aluguel)</span>`;
}
async function escolherResultado(i){
  const x=resultadosBusca[i]; if(!x) return;
  if(!x._provedores) await carregarProvedores(x,null);
  const nome=x.title||x.name;
  tmdbId=x.id; tipoEscolhido=x.media_type;
  capaEscolhida=x.poster_path?IMG+"w342"+x.poster_path:null;
  $("#f-nome").value=nome;
  atualizarPreviewCapa(nome);

  const provs=x._provedores||[];
  if(provs.length) streamingEscolhido=provs[0];
  atualizarSeletor();
  const disp=$("#disponivel");
  if(provs.length){
    disp.innerHTML="Disponível em: "+provs.map(k=>`${iconeStreaming(k)}<b>${STREAMINGS[k].nome}</b>`).join(" ");
  }else{
    disp.innerHTML="Não encontrei este título nos seus streamings — confirme onde vai assistir no seletor acima.";
  }
  disp.classList.remove("hidden");

  estruturaEscolhida=null;
  $("#grupo-te").classList.toggle("hidden",tipoEscolhido==="movie");
  if(tipoEscolhido==="tv"){
    try{
      const j=await tmdbGet(`/tv/${x.id}?language=pt-BR`);
      estruturaEscolhida=(j.seasons||[])
        .filter(s=>s.season_number>0&&s.episode_count>0)
        .map(s=>s.episode_count);
      if(!estruturaEscolhida.length) estruturaEscolhida=null;
    }catch(e){ estruturaEscolhida=null; }
  }
  $("#f-temporada").value=1; $("#f-episodio").value=1;
  mostrarPasso("form");
}
async function abrirDescoberta(id,tipo){
  const fonte=descIndex.get(tipo+"-"+id);
  if(!fonte) return;
  editandoId=null; gradeOrigem="busca";
  $("#modal-titulo").textContent="Adicionar título";
  $("#f-status").value=abaAtual==="proximo"?"proximo":"assistindo";
  resultadosBusca=[fonte];
  $("#modal").classList.remove("hidden");
  mostrarPasso("form");
  await escolherResultado(0);
}

/* ---------- salvar ---------- */
async function salvarTitulo(abrir){
  const nome=$("#f-nome").value.trim();
  if(!nome){ alert("Digite o nome do filme ou série."); return; }
  const registro={
    nome,
    streaming:streamingEscolhido,
    status:$("#f-status").value,
    temporada:parseInt($("#f-temporada").value)||1,
    episodio:parseInt($("#f-episodio").value)||1,
    capa:capaEscolhida||null,
    tmdb_id:tmdbId||null,
    tipo:tipoEscolhido,
    estrutura:estruturaEscolhida?JSON.stringify(estruturaEscolhida):null,
  };
  if(abrir){
    const s=STREAMINGS[streamingEscolhido];
    window.open(s.busca(encodeURIComponent(nome)),"_blank");
  }
  try{
    if(editandoId){
      await updateDoc(doc(bd,"usuarios",usuario.uid,"titulos",editandoId),registro);
    }else{
      registro.criado_em=serverTimestamp();
      await addDoc(colTitulos(),registro);
    }
  }catch(e){ alert("Erro ao salvar: "+e.message); return; }
  $("#modal").classList.add("hidden");
  await carregar();
}
$("#btn-salvar-abrir").onclick=()=>salvarTitulo(true);
$("#btn-salvar").onclick=()=>salvarTitulo(false);
</script>
